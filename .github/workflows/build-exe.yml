name: Build EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build EXE package
        shell: pwsh
        run: .\scripts\build_exe.ps1
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HEICConverter
          path: dist\HEICConverter.zip
          if-no-files-found: error
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          $asset = 'dist\HEICConverter.zip'
          $notesFile = "RELEASE_NOTES_$tag.md"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
              gh release upload $tag $asset --clobber
          }
          elseif (Test-Path -LiteralPath $notesFile -PathType Leaf) {
              gh release create $tag $asset --title "HEIC Converter $tag" --notes-file $notesFile
          }
          else {
              gh release create $tag $asset --title "HEIC Converter $tag" --notes "Windows EXE package. Download HEICConverter.zip, unzip it, and run HEICConverter.exe."
          }
